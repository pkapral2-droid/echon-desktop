name: Build macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate macOS icon
        run: node create-icns.js

      - name: Build app bundle (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app (enables right-click Open without xattr)
        run: |
          APP_PATH=$(find dist/mac* -name "Echon.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep --sign - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          fi

      - name: Package DMG (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --prepackaged "$(find dist/mac* -maxdepth 0 2>/dev/null | head -1)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to latest release
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          gh release upload "$LATEST_TAG" dist/Echon-${{ matrix.arch }}.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
