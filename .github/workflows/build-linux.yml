name: Build Linux

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build AppImage and deb
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Echon-linux-AppImage
          path: dist/Echon-x64.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Echon-linux-deb
          path: dist/Echon-x64.deb

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: Echon-linux-AppImage
          path: artifacts/

      - name: Download deb
        uses: actions/download-artifact@v4
        with:
          name: Echon-linux-deb
          path: artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-linux
          name: Echon Linux Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            artifacts/Echon-x64.AppImage
            artifacts/Echon-x64.deb
          body: |
            ## Echon for Linux

            **AppImage** (universal): Download `Echon-x64.AppImage`, make executable (`chmod +x`), and run.
            **Debian/Ubuntu**: Download `Echon-x64.deb` and install with `sudo dpkg -i Echon-x64.deb`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
